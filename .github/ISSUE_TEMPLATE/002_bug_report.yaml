name: Bug report
description: Track a defect or behavior regression in elephant
title: "fix(scope): "
labels:
  - bug
body:
  - type: textarea
    id: symptom
    attributes:
      label: Symptom
      description: What is broken or surprising.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, commands, or inputs needed to reproduce the issue.
    validations:
      required: true
  - type: dropdown
    id: affected_surface
    attributes:
      label: Affected surface
      description: Which surface appears affected?
      options:
        - repo-docs
        - agent-text
        - agent-exec
        - release-ops
        - app-scaffold
        - unsure
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Affected surfaces, logs, related plans, or code pointers.
    validations:
      required: true
